version: 2

before:
  hooks:
    - sh -c "cd web && npm ci && npm run build"
    - go mod tidy

builds:
  - id: debugd
    main: ./cmd/debugd
    binary: debugd
    env: [CGO_ENABLED=0]
    ldflags: ["-s -w -X main.version={{.Version}}"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: debugd
    ids: [debugd]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  draft: false
  extra_files:
    - glob: ./install.sh
