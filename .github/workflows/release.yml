name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25.11"

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web
      - name: Prepare embedded UI stub
        run: |
          mkdir -p web/dist
          printf '<!doctype html>\n' > web/dist/index.html
      - run: go test ./...
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-macos:
    name: Desktop macOS
    runs-on: macos-14
    needs: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Set desktop version from tag
        run: node scripts/set-desktop-version.mjs "$GITHUB_REF_NAME"
      - name: Write Apple notarization API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
      - name: Validate Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$CERT_PATH"
          openssl pkcs12 -in "$CERT_PATH" -passin env:APPLE_CERTIFICATE_PASSWORD -nokeys -nodes >/dev/null
      - name: Build signed and notarized macOS desktop app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        run: npm run tauri:build -- --bundles dmg,app
        working-directory: web
      - name: Generate desktop checksums
        run: |
          set -euo pipefail
          find web/src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \) -print0 \
            | xargs -0 shasum -a 256 > desktop-macos-checksums.txt
      - name: Upload desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web/src-tauri/target/release/bundle/dmg/*.dmg
            desktop-macos-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-linux:
    name: Desktop Linux
    runs-on: ubuntu-24.04
    needs: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Set desktop version from tag
        run: node scripts/set-desktop-version.mjs "$GITHUB_REF_NAME"
      - name: Build Linux desktop app
        run: npm run tauri:build -- --bundles appimage,deb
        working-directory: web
      - name: Generate desktop checksums
        run: |
          set -euo pipefail
          find web/src-tauri/target/release/bundle -type f \( -name '*.AppImage' -o -name '*.deb' \) -print0 \
            | xargs -0 shasum -a 256 > desktop-linux-checksums.txt
      - name: Upload desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web/src-tauri/target/release/bundle/appimage/*.AppImage
            web/src-tauri/target/release/bundle/deb/*.deb
            desktop-linux-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop-windows:
    name: Desktop Windows
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend dependencies
        run: npm ci
        working-directory: web
      - name: Set desktop version from tag
        run: node scripts/set-desktop-version.mjs "${{ github.ref_name }}"
      - name: Build Windows desktop app
        run: npm run tauri:build -- --bundles nsis
        working-directory: web
      - name: Generate desktop checksums
        shell: pwsh
        run: |
          Get-ChildItem web/src-tauri/target/release/bundle -Recurse -Include *.exe |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $($_.Path)" } |
            Set-Content desktop-windows-checksums.txt
      - name: Upload desktop artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web/src-tauri/target/release/bundle/nsis/*.exe
            desktop-windows-checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
